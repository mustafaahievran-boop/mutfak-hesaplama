<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üretilecek Yemek İçin Malzeme Hesaplama</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #e67e22;
            --bg: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--secondary);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary);
        }

        select, input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background-color: var(--primary);
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .result-row {
            font-weight: bold;
            color: var(--secondary);
        }

        .print-btn {
            margin-top: 20px;
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
            width: 100%;
        }

        .print-btn:hover {
            background-color: #d35400;
        }

        @media print {
            .print-btn, .input-group { display: none; }
            .container { box-shadow: none; border: none; }
        }
    </style>
</head>

<div class="container">
    <header>
        <h1>Üretilecek Yemek İçin Malzeme Hesaplama</h1>
    </header>

    <div class="input-group">
        <div class="field">

            <select id="yemekSecimi" onchange="hesapla()">
                </select>
        </div>
        <div class="field">

    </div>

    function init() {
        const select = document.getElementById('yemekSecimi');
        for (let key in receteler) {
            let opt = document.createElement('option');
            opt.value = key;
            opt.innerHTML = receteler[key].isim;
            select.appendChild(opt);
        }
        hesapla();
    }

    function hesapla() {
        const yemekKey = document.getElementById('yemekSecimi').value;
        const kisi = document.getElementById('kisiSayisi').value || 0;
        const secilenRecete = receteler[yemekKey];
        
        document.getElementById('secilenYemekBaslik').innerText = "Yemek: " + secilenRecete.isim + " (" + kisi + " Kişilik)";
        
        const listeGovdesi = document.getElementById('malzemeListesi');
        listeGovdesi.innerHTML = "";

        secilenRecete.malzemeler.forEach(item => {
            let toplam = (item.miktar * kisi);
            let birimGosterim = item.birim;
            
            if (birimGosterim === "gr" && toplam >= 1000) {
                toplam = (toplam / 1000).toFixed(2);
                birimGosterim = "kg";
            } else if (birimGosterim === "ml" && toplam >= 1000) {
                toplam = (toplam / 1000).toFixed(2);
                birimGosterim = "lt";
            } else if (birimGosterim === "gr" && (toplam % 1 !== 0)) {
                toplam = toplam.toFixed(1);
            }

            const row = `<tr>
                <td>${item.ad}</td>
                <td>${item.miktar} ${item.birim}</td>
                <td class="result-row">${toplam} ${birimGosterim}</td>
            </tr>`;
            listeGovdesi.innerHTML += row;
        });
    }

    window.onload = init;
